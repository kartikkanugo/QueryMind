[server]
address = "127.0.0.1" # Server bind address (IP or hostname)
port = 3000           # Port the server listens on

# Logging level for the server.
# Possible values:
#   "trace"  - extremely detailed logs (full execution flow)
#   "debug"  - debugging information useful for development
#   "info"   - normal operational messages (recommended default)
#   "warn"   - unexpected situations that are not fatal
#   "error"  - serious failures
log_lvl = "info"


[py_server]
address = "127.0.0.1"
port = 4000
